<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Copy All Tabs</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 12px;
        min-width: 260px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      #actions {
        display: grid;
        gap: 8px;
      }

      button {
        padding: 8px 10px;
      }

      #status {
        margin-top: 8px;
        min-height: 1.2em;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Copy All Tabs</h1>

    <div id="actions" hidden>
      <button data-format="newline" type="button">Copy one URL per line</button>
      <button data-format="csv" type="button">Copy CSV</button>
      <button data-format="json" type="button">Copy JSON array</button>
    </div>

    <p id="status" role="status" aria-live="polite"></p>

    <script src="popup.js"></script>
  </body>
</html>
