<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Copy All Tabs Options</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 24px;
        max-width: 560px;
      }

      h1 {
        margin-top: 0;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }

      select {
        width: fit-content;
        min-width: 220px;
        padding: 8px;
      }

      .hint {
        font-weight: 400;
        font-size: 0.9rem;
        opacity: 0.8;
      }

      button {
        width: fit-content;
        padding: 8px 14px;
      }

      #status {
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <h1>Copy All Tabs</h1>
    <p>Configure one-click copy behavior and optional format chooser popup.</p>

    <form id="settings-form">
      <label for="enableFormatSelection">
        <input id="enableFormatSelection" name="enableFormatSelection" type="checkbox" />
        Enable popup format chooser on click
        <span class="hint">When disabled, clicking the extension icon copies directly.</span>
      </label>

      <label for="includeTitles">
        <input id="includeTitles" name="includeTitles" type="checkbox" />
        Include tab titles
        <span class="hint">Copies each tab's title along with its URL in every format.</span>
      </label>

      <label for="defaultFormat">
        Default format (direct-copy mode)
        <select id="defaultFormat" name="defaultFormat">
          <option value="newline">One URL per line</option>
          <option value="csv">CSV</option>
          <option value="json">JSON array</option>
        </select>
        <span class="hint">Used when popup chooser is disabled.</span>
      </label>

      <button type="submit">Save</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>

    <script src="options.js"></script>
  </body>
</html>
